appId: com.familyaikitchen.app
---
- launchApp
- assertVisible: "Cook from what your family already has."
- assertVisible: "Guest offline"
- assertVisible: "Core cooking tools are available offline."
- tapOn: "Pantry"
- assertVisible: "Local pantry"
- tapOn: "Brown rice"
- inputText: "Brown rice"
- tapOn: "2"
- inputText: "2"
- tapOn: "bags"
- inputText: "bags"
- tapOn: "Pantry"
- inputText: "Pantry"
- tapOn: "YYYY-MM-DD"
- inputText: "2026-08-01"
- tapOn: "Add item"
- assertVisible: "Brown rice"
- assertVisible: "2 bags"
- assertVisible: "Expires 2026-08-01"
- stopApp
- launchApp
- tapOn: "Pantry"
- assertVisible: "Brown rice"
