# Maestro flow stub for T8.1 — Camera capture to review screen.
# Manual on-device QA covers the parts Jest cannot reach (real OS permission
# dialogs, the system camera UI, the gallery picker).
#
# Pre-conditions:
# - Run on a real device (iOS + Android both required for ticket sign-off).
# - For first run, OS permission state must be "undetermined" so the prompt
#   appears. Reset via Settings > Privacy > Camera / Photos if needed.
#
# Manual steps Maestro cannot fully script (capture intent leaves the app):
# 1. Open the app, sign in as a guest.
# 2. Tap the "Lens" tab.
# 3. Verify hero copy "Scan something" and privacy line about images staying
#    on device.
# 4. Tap "Take photo".
#    - Verify the OS shows the camera permission prompt with the rationale
#      from app.json (NSCameraUsageDescription on iOS).
#    - Allow access.
# 5. Take a photo and confirm in the system camera UI.
# 6. Verify the review screen shows the captured image + Cancel / Rescan /
#    Looks good actions.
# 7. Tap "Rescan" and verify the capture controls return.
# 8. Tap "Take photo" again and cancel from the camera UI; verify capture
#    controls remain.
# 9. Tap "Choose from gallery" and pick an image; verify it renders on the
#    review screen.
# 10. Tap "Cancel" and verify navigation returns to the previous screen.
# 11. Re-run with permission denied (Settings > Privacy off): verify the
#     "Camera access is off" alert and no preview is rendered.
# 12. Repeat steps 4-10 on Android. Compare permission rationale wording.
appId: com.familyaikitchen.app
---
- launchApp
- tapOn: "Lens"
- assertVisible: "Kitchen Lens"
- assertVisible: "Scan something"
- assertVisible: "Take photo"
- assertVisible: "Choose from gallery"
- assertVisible:
    text: "stays on your device"
    enabled: true
# Tapping "Take photo" / "Choose from gallery" leaves the app for the system
# camera/gallery UI, which Maestro cannot drive deterministically. Continue
# with the manual checklist above for the post-capture review screen.
